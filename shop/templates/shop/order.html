<!DOCTYPE html>
<html>
<head>
    <title>Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f6;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .btn-order {
            background-color: #ff3f6c;
            color: white;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="row justify-content-center">

        <div class="col-md-4 box">

            <h4>{{ product.name }}</h4>

            {% if product.image %}
            <img src="{{ product.image.url }}" class="img-fluid mb-3">
            {% endif %}

            <p>Price: ₹{{ product.price }}</p>

            <form method="POST">
                {% csrf_token %}
                <input type="text" name="customer_name" class="form-control mb-2" placeholder="Your Name" required>
                <input type="number" name="quantity" class="form-control mb-2" value="1">

                <button class="btn btn-order w-100">Place Order</button>
            </form>

        </div>

    </div>
</div>

</body>
</html>
